<!-- ── SecureU Chatbot Widget ─────────────────────────────────────────── -->

<!-- marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
    /* ── Bubble Button ───────────────────────────────────── */
    #chat-bubble {
        position: fixed;
        bottom: 28px;
        right: 28px;
        width: 58px;
        height: 58px;
        border-radius: 50%;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        box-shadow: 0 6px 24px rgba(30, 60, 114, 0.45);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
    }
    #chat-bubble:hover {
        transform: scale(1.1);
        box-shadow: 0 8px 28px rgba(30, 60, 114, 0.6);
    }
    #chat-bubble.active {
        transform: rotate(90deg) scale(1.05);
    }

    /* ── Chat Window ─────────────────────────────────────── */
    #chat-window {
        position: fixed;
        bottom: 100px;
        right: 28px;
        width: 370px;
        max-height: 540px;
        background: #ffffff;
        border-radius: 18px;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.2);
        display: flex;
        flex-direction: column;
        z-index: 9998;
        overflow: hidden;
        font-family: 'DM Sans', 'Segoe UI', sans-serif;
        /* Slide-up + fade animation */
        opacity: 0;
        transform: translateY(20px) scale(0.97);
        pointer-events: none;
        transition: opacity 0.25s ease, transform 0.25s cubic-bezier(.34,1.3,.64,1);
    }
    #chat-window.open {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: all;
    }

    /* ── Header ──────────────────────────────────────────── */
    #chat-header {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 0.95rem;
        flex-shrink: 0;
    }
    #chat-header .header-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: rgba(255,255,255,0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        flex-shrink: 0;
    }
    #chat-header .header-info {
        display: flex;
        flex-direction: column;
        line-height: 1.2;
    }
    #chat-header .header-info small {
        font-size: 0.72rem;
        opacity: 0.75;
        font-weight: 400;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    #chat-header .online-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #4cff91;
        box-shadow: 0 0 6px #4cff91;
        display: inline-block;
        animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.4; }
    }
    #chat-close-btn {
        margin-left: auto;
        background: rgba(255,255,255,0.15);
        border: none;
        color: white;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        font-size: 0.9rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
        flex-shrink: 0;
    }
    #chat-close-btn:hover { background: rgba(255,255,255,0.3); }

    /* ── Messages Area ───────────────────────────────────── */
    #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: #f4f6fb;
        scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb {
        background: #c5cedf;
        border-radius: 4px;
    }

    /* ── Message Bubbles ─────────────────────────────────── */
    .chat-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
    }
    .chat-row.user-row {
        flex-direction: row-reverse;
    }
    .chat-avatar-sm {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        flex-shrink: 0;
    }
    .chat-msg {
        max-width: 78%;
        padding: 10px 14px;
        border-radius: 16px;
        font-size: 0.875rem;
        line-height: 1.55;
        word-break: break-word;
        animation: pop-in 0.2s ease;
    }
    @keyframes pop-in {
        from { opacity: 0; transform: scale(0.95) translateY(4px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Bot bubble */
    .chat-msg.bot {
        background: #ffffff;
        color: #1a2a4a;
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    /* Markdown styles inside bot bubble */
    .chat-msg.bot ul, .chat-msg.bot ol {
        margin: 6px 0 2px 0;
        padding-left: 18px;
    }
    .chat-msg.bot li {
        margin-bottom: 3px;
    }
    .chat-msg.bot strong {
        color: #1e3c72;
    }
    .chat-msg.bot p {
        margin: 0 0 6px 0;
    }
    .chat-msg.bot p:last-child { margin-bottom: 0; }
    .chat-msg.bot code {
        background: #eef0f8;
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 0.82rem;
        font-family: 'DM Mono', monospace;
        color: #2a5298;
    }

    /* User bubble */
    .chat-msg.user {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        border-bottom-right-radius: 4px;
        box-shadow: 0 2px 8px rgba(30,60,114,0.3);
    }

    /* Timestamp */
    .chat-timestamp {
        font-size: 0.68rem;
        color: #9aaccb;
        text-align: center;
        margin: 2px 0 4px;
    }

    /* ── Typing Indicator ────────────────────────────────── */
    .typing-indicator {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 12px 16px;
    }
    .typing-indicator span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #8fa8d0;
        animation: bounce-dot 1.2s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce-dot {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
        30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input Row ───────────────────────────────────────── */
    #chat-input-row {
        display: flex;
        align-items: center;
        gap: 8px;
        border-top: 1px solid #e4e9f5;
        background: #fff;
        padding: 10px 12px;
        flex-shrink: 0;
    }
    #chat-input {
        flex: 1;
        border: 1.5px solid #dde4f5;
        border-radius: 22px;
        padding: 9px 15px;
        font-size: 0.875rem;
        outline: none;
        background: #f7f9ff;
        color: #1a2a4a;
        transition: border-color 0.2s;
        font-family: inherit;
    }
    #chat-input:focus {
        border-color: #2a5298;
        background: #fff;
    }
    #chat-input::placeholder { color: #aab4cc; }
    #chat-send {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        border: none;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 3px 10px rgba(30,60,114,0.3);
    }
    #chat-send:hover {
        transform: scale(1.08);
        box-shadow: 0 5px 14px rgba(30,60,114,0.45);
    }
    #chat-send:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }
</style>

<!-- ── Floating Bubble Button ── -->
<button id="chat-bubble" title="Ask SecureU Assistant">🛡️</button>

<!-- ── Chat Window ── -->
<div id="chat-window">

    <!-- Header -->
    <div id="chat-header">
        <div class="header-avatar">🛡️</div>
        <div class="header-info">
            <span>SecureU Assistant</span>
            <small><span class="online-dot"></span> Online — AI Powered</small>
        </div>
        <button id="chat-close-btn" onclick="toggleChat()" title="Close">✕</button>
    </div>

    <!-- Messages -->
    <div id="chat-messages">
        <div class="chat-timestamp">Today</div>
        <div class="chat-row">
            <div class="chat-avatar-sm">🛡️</div>
            <div class="chat-msg bot">
                👋 Hi! I'm your cybersecurity assistant.<br>
                Ask me anything about <strong>SSL</strong>, <strong>security headers</strong>, <strong>phishing</strong>, or your scan results!
            </div>
        </div>
    </div>

    <!-- Input -->
    <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Ask a security question…" autocomplete="off" />
        <button id="chat-send" onclick="sendChat()" title="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

</div>

<script>
    // Configure marked for safe rendering
    marked.setOptions({ breaks: true, gfm: true });

    let chatHistory = [];
    let chatOpen = false;
    let isSending = false;
    let scanContext = '';

    // ── Build a plain-text scan report from window.SCAN_REPORT ──
    function buildScanContext() {
        const r = window.SCAN_REPORT;
        if (!r) return '';

        const missingHdrs = r.missing_headers.length
            ? r.missing_headers.join(', ')
            : 'None';
        const vulns = r.vuln_findings.length
            ? r.vuln_findings.join(' | ')
            : 'None detected';
        const recs = r.recommendations.map(
            (rec, i) => `${i+1}. [${rec.priority}] ${rec.issue} → ${rec.fix}`
        ).join('\n');

        return `
URL Scanned: ${r.url}
Scan Time: ${r.scan_time}

OVERALL SCORE: ${r.score}/100  |  Grade: ${r.grade}  |  Level: ${r.level}

SCORE BREAKDOWN:
- SSL/HTTPS: ${r.breakdown.ssl}/20
- Security Headers: ${r.breakdown.headers}/20
- URL Safety: ${r.breakdown.url}/20
- Vulnerabilities: ${r.breakdown.vulnerabilities}/20
- Availability: ${r.breakdown.availability}/20

SSL STATUS: ${r.ssl_valid ? 'Valid' : 'INVALID — ' + r.ssl_error}

MISSING SECURITY HEADERS: ${missingHdrs}

VULNERABILITY FINDINGS: ${vulns}

ML CLASSIFICATION: ${r.ml_prediction} (${r.ml_confidence}% confidence)

TOP RECOMMENDATIONS:
${recs || 'No major issues found.'}
`.trim();
    }

    // ── Build proactive greeting message for result page ──
    function buildGreeting() {
        const r = window.SCAN_REPORT;
        if (!r) return null;

        const scoreEmoji = r.score >= 80 ? '✅' : r.score >= 60 ? '⚠️' : r.score >= 40 ? '🟠' : '🔴';
        const mlEmoji    = r.ml_prediction === 'Safe' ? '🟢' : '🔴';
        const topIssues  = r.recommendations.slice(0, 3).map(
            rec => `- **[${rec.priority}]** ${rec.issue}`
        ).join('\n');

        return `📊 **Scan complete for:** \`${r.url}\`

${scoreEmoji} **Security Score:** ${r.score}/100 — **${r.level}** (Grade ${r.grade})
${mlEmoji} **ML Engine:** ${r.ml_prediction} (${r.ml_confidence}% confidence)

**Top Issues Found:**
${topIssues || '- No critical issues detected 🎉'}

Ask me anything about these results or how to fix specific issues!`;
    }

    // ── Toggle open/close ──
    function toggleChat() {
        chatOpen = !chatOpen;
        document.getElementById('chat-window').classList.toggle('open', chatOpen);
        document.getElementById('chat-bubble').classList.toggle('active', chatOpen);
        if (chatOpen) setTimeout(() => document.getElementById('chat-input').focus(), 250);
    }
    document.getElementById('chat-bubble').addEventListener('click', toggleChat);

    // ── Enter key to send ──
    document.getElementById('chat-input').addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
    });

    // ── Get current time string ──
    function timeStr() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // ── Append a user message ──
    function appendUser(text) {
        const box = document.getElementById('chat-messages');

        const row = document.createElement('div');
        row.className = 'chat-row user-row';

        const bubble = document.createElement('div');
        bubble.className = 'chat-msg user';
        bubble.textContent = text;

        row.appendChild(bubble);
        box.appendChild(row);

        const ts = document.createElement('div');
        ts.className = 'chat-timestamp';
        ts.textContent = timeStr();
        box.appendChild(ts);

        box.scrollTop = box.scrollHeight;
    }

    // ── Append bot typing indicator ── returns the row element
    function appendTyping() {
        const box = document.getElementById('chat-messages');
        const row = document.createElement('div');
        row.className = 'chat-row';
        row.id = 'typing-row';

        const avatar = document.createElement('div');
        avatar.className = 'chat-avatar-sm';
        avatar.textContent = '🛡️';

        const bubble = document.createElement('div');
        bubble.className = 'chat-msg bot typing-indicator';
        bubble.innerHTML = '<span></span><span></span><span></span>';

        row.appendChild(avatar);
        row.appendChild(bubble);
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
        return row;
    }

    // ── Append a bot message (with markdown) ──
    function appendBot(text) {
        const box = document.getElementById('chat-messages');
        const row = document.createElement('div');
        row.className = 'chat-row';

        const avatar = document.createElement('div');
        avatar.className = 'chat-avatar-sm';
        avatar.textContent = '🛡️';

        const bubble = document.createElement('div');
        bubble.className = 'chat-msg bot';
        bubble.innerHTML = marked.parse(text);

        row.appendChild(avatar);
        row.appendChild(bubble);
        box.appendChild(row);

        const ts = document.createElement('div');
        ts.className = 'chat-timestamp';
        ts.textContent = timeStr();
        box.appendChild(ts);

        box.scrollTop = box.scrollHeight;
        return row;
    }

    // ── Replace typing with actual bot reply (with markdown) ──
    function replaceTypingWithReply(typingRow, text) {
        const box = document.getElementById('chat-messages');

        const row = document.createElement('div');
        row.className = 'chat-row';

        const avatar = document.createElement('div');
        avatar.className = 'chat-avatar-sm';
        avatar.textContent = '🛡️';

        const bubble = document.createElement('div');
        bubble.className = 'chat-msg bot';
        bubble.innerHTML = marked.parse(text);

        row.appendChild(avatar);
        row.appendChild(bubble);

        box.replaceChild(row, typingRow);

        const ts = document.createElement('div');
        ts.className = 'chat-timestamp';
        ts.textContent = timeStr();
        box.appendChild(ts);

        box.scrollTop = box.scrollHeight;
    }

    // ── Main send function ──
    async function sendChat() {
        if (isSending) return;
        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('chat-send');
        const msg = input.value.trim();
        if (!msg) return;

        isSending = true;
        sendBtn.disabled = true;
        input.value = '';
        input.disabled = true;

        appendUser(msg);
        const typingRow = appendTyping();

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    msg, 
                    history: chatHistory,
                    scan_context: scanContext
                })
            });
            const data = await res.json();
            const reply = data.reply || "Sorry, I couldn't get a response.";

            replaceTypingWithReply(typingRow, reply);

            chatHistory.push({ role: 'user', content: msg });
            chatHistory.push({ role: 'assistant', content: reply });
            if (chatHistory.length > 12) chatHistory = chatHistory.slice(-12);

        } catch (err) {
            replaceTypingWithReply(typingRow, '⚠️ Connection error. Please try again.');
        } finally {
            isSending = false;
            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
        }
    }

    // ── On page load: detect scan report and inject context ──
    document.addEventListener('DOMContentLoaded', function () {
        if (window.SCAN_REPORT) {
            scanContext = buildScanContext();

            const box = document.getElementById('chat-messages');
            box.innerHTML = '';

            const ts = document.createElement('div');
            ts.className = 'chat-timestamp';
            ts.textContent = 'Scan Report Loaded';
            box.appendChild(ts);

            const greeting = buildGreeting();
            appendBot(greeting);

            setTimeout(() => {
                if (!chatOpen) toggleChat();
            }, 1200);
        }
    });
</script>
<!-- ── End Chatbot Widget ──────────────────────────────────────────────── -->
