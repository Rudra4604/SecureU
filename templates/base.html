<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SecureU — Website Security Scanner{% endblock %}</title>

    <!-- SEO Metadata -->
    <meta name="description" content="SecureU is a professional cybersecurity vulnerability scanner and threat defense tool. Analyze any URL in seconds for SSL, security headers, XSS, SQLi, and phishing patterns using active heuristics and Machine Learning.">
    <meta name="keywords" content="SecureU, security scanner, website vulnerability, SSL certificate validator, security headers compliance, machine learning URL analysis, phishing detector, cybersecurity portfolio">
    <meta name="author" content="SecureU">

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="SecureU — Website Security Scanner">
    <meta property="og:description" content="Analyze any URL in seconds for SSL, security headers, vulnerability risks, and phishing heuristics using active checks and Machine Learning.">
    <meta property="og:image" content="{{ url_for('static', filename='favicon.svg') }}">
    <meta property="og:url" content="{{ request.url }}">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary">
    <meta property="twitter:title" content="SecureU — Website Security Scanner">
    <meta property="twitter:description" content="Analyze any URL in seconds for SSL, security headers, vulnerability risks, and phishing heuristics using active checks and Machine Learning.">
    <meta property="twitter:image" content="{{ url_for('static', filename='favicon.svg') }}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

    <!-- Google Fonts: Syne (display) + DM Sans (body) + DM Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Bootstrap 5 (light mode) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">

    {% block extra_css %}{% endblock %}
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     NAVIGATION BAR
     ══════════════════════════════════════════════════════════ -->
<nav class="navbar navbar-expand-lg glass-nav fixed-top">
    <div class="container">

        <!-- Brand -->
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <div class="brand-icon-wrap">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <span class="brand-text">Secure<span class="text-accent">U</span></span>
        </a>

        <!-- Mobile toggle -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links -->
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav align-items-center gap-1">
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
                        <i class="fa-solid fa-radar me-1"></i>Scanner
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'about' %}active{% endif %}" href="/about">
                        <i class="fa-solid fa-info-circle me-1"></i>About
                    </a>
                </li>
                <!-- Live status indicator -->
                <li class="nav-item ms-2">
                    <span class="nav-link pe-none" style="cursor:default;">
                        <span class="nav-status-dot"></span>
                        <span class="fs-xs text-muted fw-medium">All systems operational</span>
                    </span>
                </li>
            </ul>
        </div>

    </div>
</nav>

<!-- ── Main Content ──────────────────────────────────────── -->
<main class="main-content">
    {% block content %}{% endblock %}
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}{% endblock %}

<!-- ── SecureU Chatbot Widget (visible on all pages) ── -->
{% include 'ChatbotWidget.html' %}

</body>
</html>
